<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CHREAACH — Riverside</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#0d0a1a;overflow-x:hidden}

  /* ── LANDING ── */
  #landing{
    position:fixed;inset:0;background:#0d0a1a;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;z-index:100;
  }
  #landing h1{
    font-family:'Georgia',serif;font-size:clamp(36px,10vw,90px);
    font-weight:900;letter-spacing:6px;color:#fff;
    text-shadow:0 0 60px rgba(180,120,255,0.6);
  }
  #landing p{font-size:14px;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;font-family:sans-serif}
  #enterBtn{
    margin-top:12px;padding:14px 40px;background:linear-gradient(135deg,#7c3aed,#a855f7);
    border:none;border-radius:40px;color:#fff;font-size:14px;letter-spacing:3px;
    text-transform:uppercase;cursor:pointer;font-weight:700;
    box-shadow:0 4px 30px rgba(168,85,247,0.5);font-family:sans-serif;
    transition:transform 0.15s,opacity 0.2s;
  }
  #enterBtn:hover{transform:scale(1.05);opacity:0.9}
  #landing.hidden{display:none}

  /* ── MAIN ── */
  #main{display:none;flex-direction:column;min-height:100vh}
  #main.show{display:flex}

  /* youtube embed hidden — just for audio */
  #ytFrame{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;top:0;left:0}

  #churchWrap{position:relative;flex:1}
  #churchCanvas{display:block;width:100%;cursor:default}
  #hint{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    color:rgba(255,255,255,0.55);font-size:11px;letter-spacing:2px;text-transform:uppercase;
    pointer-events:none;background:rgba(0,0,0,0.35);padding:4px 14px;border-radius:20px;
    font-family:sans-serif;white-space:nowrap;
  }
  #nowplaying{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:40px;
    padding:6px 18px;font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,0.75);
    white-space:nowrap;pointer-events:none;font-family:sans-serif;
  }

  #bar{
    display:flex;justify-content:center;gap:10px;padding:10px 14px;
    background:rgba(0,0,0,0.55);border-top:1px solid rgba(255,255,255,0.08);flex-wrap:wrap;
  }
  .ntag{
    padding:7px 20px;border-radius:40px;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,0.22);
    color:#fff;background:rgba(255,255,255,0.12);transition:background 0.2s,transform 0.15s;
    font-weight:700;font-family:sans-serif;
  }
  .ntag:hover{background:rgba(255,255,255,0.26);transform:scale(1.05)}

  /* ── OVERLAY ── */
  #ov{
    display:none;flex-direction:column;align-items:center;gap:18px;
    text-align:center;padding:2.5rem 1.5rem;
    background:linear-gradient(160deg,#0f0c29,#1a0533,#130a2b);
    min-height:100vh;justify-content:center;
  }
  #ov.on{display:flex}
  #ovCanvas{
    border-radius:50%;background:rgba(255,255,255,0.04);
    border:2px solid rgba(255,255,255,0.12);
    animation:swing 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes swing{from{transform:translateY(-140px) rotate(-15deg) scale(0.3);opacity:0}to{transform:none;opacity:1}}
  #ovName{
    font-size:clamp(30px,9vw,64px);font-weight:900;letter-spacing:5px;
    background:linear-gradient(90deg,#fff 0%,#c9a0ff 50%,#fff 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:pop 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    font-family:'Georgia',serif;
  }
  @keyframes pop{from{transform:scale(0.2);opacity:0}to{transform:scale(1);opacity:1}}
  #preachBtn{
    padding:13px 34px;background:linear-gradient(135deg,#7c3aed,#a855f7);
    border:none;border-radius:40px;color:#fff;font-size:13px;letter-spacing:2.5px;
    text-transform:uppercase;cursor:pointer;font-weight:700;font-family:sans-serif;
    box-shadow:0 4px 24px rgba(168,85,247,0.45);transition:opacity 0.2s,transform 0.15s;
  }
  #preachBtn:hover{opacity:0.88;transform:scale(1.04)}
  #vbox{
    max-width:420px;padding:1.4rem 1.8rem;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;display:none;animation:fadeUp 0.5s ease both;
  }
  @keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  #vtext{font-size:15px;color:#fff;line-height:1.9;font-style:italic;font-weight:500;font-family:'Georgia',serif}
  #vref{font-size:12px;color:rgba(255,255,255,0.45);margin-top:10px;letter-spacing:2px;text-transform:uppercase;font-family:sans-serif}
  #backBtn{
    background:none;border:none;color:rgba(255,255,255,0.35);font-size:11px;
    letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:sans-serif;
    transition:color 0.2s;margin-top:4px;
  }
  #backBtn:hover{color:rgba(255,255,255,0.7)}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <h1>CHREAACH</h1>
  <p>Riverside — tap to enter</p>
  <button id="enterBtn" onclick="enter()">Enter</button>
</div>

<!-- MAIN -->
<div id="main">
  <iframe id="ytFrame" src="" allow="autoplay" frameborder="0"></iframe>

  <div id="churchWrap">
    <canvas id="churchCanvas" width="700" height="490"></canvas>
    <div id="hint">tap a character or their name below</div>
    <div id="nowplaying">♪ Come Out of that Grave — Bethel Music &amp; Brandon Lake</div>
  </div>

  <div id="bar">
    <div class="ntag" onclick="open_('chris')">Chris</div>
    <div class="ntag" onclick="open_('rio')">Rio</div>
    <div class="ntag" onclick="open_('sofia')">Sofia</div>
    <div class="ntag" onclick="open_('manasseh')">Manasseh</div>
  </div>

  <!-- SPOTLIGHT OVERLAY -->
  <div id="ov">
    <canvas id="ovCanvas" width="160" height="190"></canvas>
    <div id="ovName"></div>
    <button id="preachBtn" onclick="showVerse()">PICK IT UP &amp; PREACH</button>
    <div id="vbox"><p id="vtext"></p><p id="vref"></p></div>
    <button id="backBtn" onclick="close_()">← back to church</button>
  </div>
</div>

<script>
function enter(){
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('main').classList.add('show');
  document.getElementById('ytFrame').src=
    'https://www.youtube.com/embed/KVYO9KsVGI4?autoplay=1&loop=1&playlist=KVYO9KsVGI4&controls=0&mute=0';
}

/* ── CANVAS SETUP ── */
const CV=document.getElementById('churchCanvas');
const cx=CV.getContext('2d');
const W=700,H=490;
let T=0;

const DATA={
  chris:   {reach:'CHREAACH',   verse:'Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me; your rod and your staff, they comfort me.',ref:'Psalm 23:4'},
  rio:     {reach:'RIEAACHH',   verse:'Fear not, for I am with you; be not dismayed, for I am your God. I will strengthen you, I will help you, I will uphold you with my righteous right hand.',ref:'Isaiah 41:10'},
  sofia:   {reach:'SOFREACCHH', verse:'The Lord is my shepherd; I shall not want. He makes me lie down in green pastures. He leads me beside still waters. He restores my soul.',ref:'Psalm 23:1–3'},
  manasseh:{reach:'MANREACCHH', verse:'Vanity of vanities, says the Preacher, vanity of vanities! All is vanity.',ref:'Ecclesiastes 1:2'}
};

const CHARS={
  chris:   {bx:120,by:345,spd:0.5, sx:1},
  rio:     {bx:268,by:328,spd:1.0, sx:1},
  sofia:   {bx:430,by:342,spd:0.5, sx:1},
  manasseh:{bx:578,by:336,spd:0.48,sx:-1}
};
const ZONES={
  chris:   [{x:88,y:342},{x:152,y:342},{x:112,y:326},{x:146,y:356}],
  rio:     [{x:233,y:323},{x:328,y:323},{x:268,y:308},{x:308,y:336}],
  sofia:   [{x:388,y:336},{x:488,y:336},{x:438,y:320},{x:468,y:350}],
  manasseh:[{x:542,y:328},{x:622,y:328},{x:578,y:313},{x:608,y:346}]
};

let agents={};
Object.keys(CHARS).forEach(id=>{
  const c=CHARS[id];
  agents[id]={x:c.bx,y:c.by,tx:c.bx,ty:c.by,sx:c.sx,pause:20+Math.random()*50};
});
function pickTarget(id){
  const zs=ZONES[id],z=zs[Math.floor(Math.random()*zs.length)];
  agents[id].tx=z.x;agents[id].ty=z.y;agents[id].pause=65+Math.random()*100;
}
function stepAgents(){
  Object.entries(agents).forEach(([id,a])=>{
    if(a.pause>0){a.pause--;if(a.pause===0)pickTarget(id);return;}
    const dx=a.tx-a.x,dy=a.ty-a.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<1.5){a.pause=55+Math.random()*80;return;}
    if(Math.abs(dx)>0.5)a.sx=dx>0?1:-1;
    a.x+=dx/d*CHARS[id].spd;a.y+=dy/d*CHARS[id].spd;
  });
}

function bg(){
  cx.fillStyle='#1a1228';cx.fillRect(0,0,W,H);
  cx.fillStyle='#4a3a6a';cx.fillRect(55,100,590,370);
  cx.fillStyle='#3a2a5a';cx.fillRect(55,65,590,42);
  cx.beginPath();cx.moveTo(350,8);cx.lineTo(55,65);cx.lineTo(645,65);cx.closePath();cx.fillStyle='#22123a';cx.fill();
  cx.fillStyle='#ffe8aa';cx.beginPath();cx.arc(350,40,20,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fffce0';cx.beginPath();cx.arc(350,40,11,0,Math.PI*2);cx.fill();
  cx.fillStyle='#22123a';cx.fillRect(322,100,56,105);cx.fillStyle='#ffe8aa';cx.fillRect(330,108,40,75);
  for(let i=0;i<7;i++){
    const lx=105+i*82,gs=6+2.5*Math.sin(T*0.04+i);
    cx.fillStyle=`rgba(255,230,140,${0.5+0.3*Math.sin(T*0.05+i)})`;cx.beginPath();cx.arc(lx,126,gs,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,252,210,0.9)';cx.beginPath();cx.arc(lx,126,3,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle='#8b6abf';cx.fillRect(75,305,550,165);
  cx.fillStyle='#6a4a9a';for(let i=0;i<5;i++)cx.fillRect(75+i*112,305,108,10);
  cx.fillStyle='#5a3a8a';cx.fillRect(55,322,30,148);cx.fillRect(615,322,30,148);
  cx.fillStyle='#3a2060';cx.fillRect(0,452,W,38);
  cx.fillStyle='rgba(255,232,140,0.05)';cx.beginPath();cx.arc(350,118,190,0,Math.PI*2);cx.fill();
  cx.save();cx.font='bold 28px sans-serif';cx.fillStyle='rgba(255,255,255,0.09)';cx.textAlign='center';cx.fillText('RIVERSIDE',350,278);cx.restore();
  ['♪','♫','♩','♪','♫'].forEach((n,i)=>{
    const nx=[148,190,492,538,340][i],ny=205+17*Math.sin(T*0.03+i*1.4);
    cx.fillStyle=`rgba(255,215,80,${0.4+0.3*Math.sin(T*0.04+i)})`;cx.font='15px serif';cx.textAlign='left';cx.fillText(n,nx,ny);
  });
  Object.entries(agents).forEach(([id,a])=>{
    cx.save();cx.font='bold 11px sans-serif';
    const label=id.charAt(0).toUpperCase()+id.slice(1),lw=cx.measureText(label).width+18;
    cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();cx.roundRect(a.x-lw/2,a.y+60,lw,18,9);cx.fill();
    cx.fillStyle='#fff';cx.textAlign='center';cx.fillText(label,a.x,a.y+73);cx.restore();
  });
}

function eyes(g,x,y,blink,iris){
  if(!blink){
    g.fillStyle='white';g.beginPath();g.ellipse(x-5,y,3,3.5,0,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(x+5,y,3,3.5,0,0,Math.PI*2);g.fill();
    g.fillStyle=iris||'#111';g.beginPath();g.arc(x-4.5,y+0.5,1.8,0,Math.PI*2);g.fill();g.beginPath();g.arc(x+5.5,y+0.5,1.8,0,Math.PI*2);g.fill();
  } else {
    g.strokeStyle='#111';g.lineWidth=1.5;g.beginPath();g.moveTo(x-8,y);g.lineTo(x-2,y-1);g.stroke();g.beginPath();g.moveTo(x+2,y);g.lineTo(x+8,y-1);g.stroke();
  }
}
function grin(g,x,y,w){g.beginPath();g.moveTo(x-w,y);g.quadraticCurveTo(x,y+5,x+w,y);g.strokeStyle='rgba(70,30,10,0.55)';g.lineWidth=1.5;g.stroke();}

function drawChris(g,ox,oy,t,sx){
  const mv=agents.chris&&agents.chris.pause<4;
  const walk=mv?Math.sin(t*0.13)*7:0,bob=Math.sin(t*0.07)*2,arm=mv?Math.sin(t*0.13)*14:Math.sin(t*0.06)*5;
  g.save();g.translate(ox,oy);g.scale(sx,1);
  g.fillStyle='#333355';
  g.save();g.translate(-9,28);g.rotate(walk*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.save();g.translate(9,28);g.rotate(-walk*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.fillStyle='#111';
  g.save();g.translate(-9,50);g.rotate(walk*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.save();g.translate(9,50);g.rotate(-walk*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.fillStyle='#2a1a6a';g.fillRect(-19,12,38,34);
  g.fillStyle='#8B5E3C';
  g.save();g.translate(-19,16);g.rotate(arm*Math.PI/180);g.fillRect(-4,0,8,20);g.restore();
  g.save();g.translate(19,16);g.rotate((-arm+10)*Math.PI/180);
  g.fillRect(-4,0,8,18);g.translate(0,18);
  g.fillStyle='#556';g.fillRect(0,-2,22,14);g.fillStyle='#1a1a2a';g.fillRect(2,0,18,10);
  [['#7c5cfc',1],['#4af0a0',4],['#f0a04a',7]].forEach(([c,dy])=>{g.fillStyle=c;g.fillRect(3,dy,4+((t*0.8+dy*30)%10|0),2);});
  g.restore();
  const hy=bob;
  g.fillStyle='#8B5E3C';g.fillRect(-9,hy+1,18,10);g.beginPath();g.arc(0,hy,18,0,Math.PI*2);g.fill();
  g.fillStyle='#0a0504';g.beginPath();g.ellipse(0,hy-13,18,9,0,0,Math.PI*2);g.fill();g.fillRect(-18,hy-14,36,10);
  for(let i=-3;i<=3;i++){
    const bx=i*5.5,sw=Math.sin(t*0.08+i*0.5)*(mv?4:2);
    g.strokeStyle='#0a0504';g.lineWidth=2;g.beginPath();g.moveTo(bx,hy-17);g.bezierCurveTo(bx+sw,hy+1,bx-sw,hy+16,bx+sw*0.5,hy+32);g.stroke();
    g.fillStyle='#0a0504';g.beginPath();g.arc(bx+sw*0.5,hy+32,1.8,0,Math.PI*2);g.fill();
  }
  eyes(g,0,hy,false,'#111');grin(g,0,hy+9,5);g.restore();
}

function drawRio(g,ox,oy,t,sx){
  const mv=agents.rio&&agents.rio.pause<4;
  const jh=Math.abs(Math.sin(t*0.1))*11,arm=Math.sin(t*0.1)*26,leg=mv?Math.sin(t*0.13)*20:Math.sin(t*0.1)*14,mouth=0.5+0.5*Math.abs(Math.sin(t*0.12));
  g.save();g.translate(ox,oy-jh);g.scale(sx,1);
  g.fillStyle='#1a1a5a';
  g.save();g.translate(-9,26);g.rotate(leg*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.save();g.translate(9,26);g.rotate(-leg*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.fillStyle='#e05a30';
  g.save();g.translate(-9,48);g.rotate(leg*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.save();g.translate(9,48);g.rotate(-leg*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.fillStyle='#e05a30';g.fillRect(-19,14,38,30);
  g.fillStyle='#d4956e';
  g.save();g.translate(19,18);g.rotate((30-arm)*Math.PI/180);g.fillRect(-4,0,8,20);g.restore();
  g.save();g.translate(-19,18);g.rotate((-50+arm)*Math.PI/180);
  g.fillStyle='#d4956e';g.fillRect(-4,0,8,20);g.translate(0,20);
  g.fillStyle='#333';g.beginPath();g.ellipse(0,0,5,8,0,0,Math.PI*2);g.fill();g.strokeStyle='#aaa';g.lineWidth=1;g.stroke();
  g.fillStyle='#555';g.fillRect(-1,8,2,8);g.restore();
  g.fillStyle='#d4956e';g.fillRect(-9,1,18,10);g.beginPath();g.arc(0,0,17,0,Math.PI*2);g.fill();
  g.fillStyle='#0f0808';
  for(let i=0;i<6;i++){const cx2=-12+i*5;for(let j=0;j<5;j++){g.beginPath();g.arc(cx2+(j%2)*1.5,-8-j*5,3.5-j*0.35,0,Math.PI*2);g.fill();}}
  g.beginPath();g.ellipse(0,-9,12,5,0,0,Math.PI*2);g.fill();g.fillStyle='#1a0a0a';g.beginPath();g.arc(0,-7,9,Math.PI,0);g.fill();
  eyes(g,0,0,(T%72<3),'#111');
  g.fillStyle='#c0503a';g.beginPath();g.ellipse(0,9,4,3*mouth,0,0,Math.PI*2);g.fill();
  g.fillStyle='white';g.beginPath();g.ellipse(0,8,2.5,1.5*mouth,0,0,Math.PI);g.fill();
  const sr=12+4*Math.sin(T*0.1);
  g.strokeStyle=`rgba(255,220,80,${0.4+0.3*Math.sin(T*0.1)})`;g.lineWidth=1.5;
  g.beginPath();g.arc(-26,10,sr,Math.PI*1.2,Math.PI*0.8,false);g.stroke();
  g.beginPath();g.arc(-26,10,sr+6,Math.PI*1.25,Math.PI*0.75,false);g.stroke();
  ['♪','♫','♩'].forEach((n,i)=>{const a2=T*0.07+i*2.1;g.fillStyle=`rgba(255,210,60,${0.6+0.3*Math.sin(T*0.05+i)})`;g.font='13px serif';g.textAlign='left';g.fillText(n,22*Math.cos(a2),-16+10*Math.sin(a2));});
  g.restore();
}

function drawSofia(g,ox,oy,t,sx){
  const mv=agents.sofia&&agents.sofia.pause<4;
  const bob=Math.sin(t*0.07)*2,stir=Math.sin(t*0.05)*14,leg=mv?Math.sin(t*0.1)*15:0,arm=mv?Math.sin(t*0.1)*18:0,hs=Math.sin(t*0.07)*3;
  g.save();g.translate(ox,oy);g.scale(sx,1);
  g.fillStyle='#d46090';
  g.save();g.translate(-9,28);g.rotate(leg*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.save();g.translate(9,28);g.rotate(-leg*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.fillStyle='#e84090';
  g.save();g.translate(-9,50);g.rotate(leg*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.save();g.translate(9,50);g.rotate(-leg*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.fillStyle='#e84090';g.fillRect(-19,14,38,34);g.fillStyle='rgba(255,255,255,0.85)';g.fillRect(-13,20,26,22);
  g.fillStyle='#f5d5c0';
  if(!mv){
    g.save();g.translate(19,20);g.rotate((25+stir)*Math.PI/180);g.fillRect(-4,0,8,22);g.restore();
    g.fillStyle='#c0a060';g.save();g.translate(19,20);g.rotate((25+stir)*Math.PI/180);g.translate(0,24);g.beginPath();g.ellipse(0,0,6,4,0,0,Math.PI*2);g.fill();g.restore();
    g.fillStyle='#f5d5c0';g.save();g.translate(-19,22);g.rotate(-18*Math.PI/180);g.fillRect(-4,0,8,20);g.restore();
  } else {
    g.save();g.translate(-19,20);g.rotate(-arm*Math.PI/180);g.fillRect(-4,0,8,20);g.restore();
    g.save();g.translate(19,20);g.rotate(arm*Math.PI/180);g.fillRect(-4,0,8,20);g.restore();
  }
  const hy=bob;
  g.fillStyle='#f5d5c0';g.fillRect(-9,hy+1,18,10);g.beginPath();g.arc(0,hy,17,0,Math.PI*2);g.fill();
  g.fillStyle='#e8c84a';g.beginPath();g.ellipse(0,hy-11,17,8,0,0,Math.PI*2);g.fill();g.fillRect(-17,hy-11,34,10);
  g.beginPath();g.ellipse(-17+hs,hy+9,5,15,(-4+hs)*Math.PI/180,0,Math.PI*2);g.fill();
  g.beginPath();g.ellipse(17-hs,hy+9,5,15,(4-hs)*Math.PI/180,0,Math.PI*2);g.fill();
  g.fillStyle='white';g.fillRect(-13,hy-18,26,8);g.beginPath();g.ellipse(0,hy-21,13,8,0,0,Math.PI*2);g.fill();
  eyes(g,0,hy,false,'#4a90d9');grin(g,0,hy+8,5);
  if(!mv){
    g.fillStyle='#888';g.fillRect(-14,62,28,16);g.fillStyle='#555';g.fillRect(-18,58,36,8);
    g.fillStyle='#e8a050';g.beginPath();g.ellipse(0,62,12,4,0,0,Math.PI*2);g.fill();
    [[-8,48],[2,41],[10,46]].forEach(([hx2,hy2],i)=>{g.fillStyle=`rgba(255,150,160,${0.5+0.3*Math.sin(T*0.05+i)})`;g.font='10px serif';g.textAlign='left';g.fillText('♥',hx2,hy2-6*Math.sin(T*0.035+i));});
  }
  g.restore();
}

function drawManasseh(g,ox,oy,t,sx){
  const mv=agents.manasseh&&agents.manasseh.pause<4;
  const bob=Math.sin(t*0.055)*2,leg=mv?Math.sin(t*0.09)*16:0,arm=mv?Math.sin(t*0.09)*18:Math.sin(t*0.04)*5,mouth=0.4+0.4*Math.abs(Math.sin(t*0.09));
  g.save();g.translate(ox,oy);g.scale(sx,1);
  g.fillStyle='#2a5a40';
  g.save();g.translate(-9,28);g.rotate(leg*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.save();g.translate(9,28);g.rotate(-leg*Math.PI/180);g.fillRect(-5,0,10,26);g.restore();
  g.fillStyle='#e05a30';
  g.save();g.translate(-9,50);g.rotate(leg*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.save();g.translate(9,50);g.rotate(-leg*Math.PI/180);g.fillRect(-6,0,12,6);g.restore();
  g.fillStyle='#3a8a50';g.fillRect(-19,14,38,36);
  g.fillStyle='#3d1e08';
  g.save();g.translate(-19,18);g.rotate(-arm*Math.PI/180);g.fillRect(-4,0,8,22);g.restore();
  g.save();g.translate(19,18);g.rotate(arm*Math.PI/180);g.fillRect(-4,0,8,22);g.restore();
  const hy=bob;
  g.fillStyle='#3d1e08';g.fillRect(-9,hy+1,18,10);g.beginPath();g.arc(0,hy,17,0,Math.PI*2);g.fill();
  g.fillStyle='#050202';g.beginPath();g.ellipse(0,hy-11,17,8,0,0,Math.PI*2);g.fill();g.fillRect(-17,hy-11,34,10);
  for(let i=-2;i<=2;i++){
    const bx=i*6.5,bs=Math.sin(t*0.06+i*0.7)*(mv?5:2);
    g.strokeStyle='#050202';g.lineWidth=4.5;g.beginPath();g.moveTo(bx,hy-14);g.bezierCurveTo(bx+bs,hy+2,bx-bs,hy+18,bx+bs*0.5,hy+36);g.stroke();
    for(let s=0;s<5;s++){g.strokeStyle='#1a0808';g.lineWidth=1;g.beginPath();g.moveTo(bx-2,hy-12+s*9);g.lineTo(bx+2,hy-12+s*9);g.stroke();}
    g.fillStyle='#050202';g.beginPath();g.arc(bx+bs*0.5,hy+36,2.5,0,Math.PI*2);g.fill();
  }
  for(let i=-1;i<=1;i+=2){
    const bx=i*19,bs=Math.sin(t*0.06+i)*(mv?4:1.5);
    g.strokeStyle='#050202';g.lineWidth=5;g.beginPath();g.moveTo(bx,hy-7);g.bezierCurveTo(bx+bs+i*4,hy+8,bx+bs+i*5,hy+24,bx+bs+i*3,hy+44);g.stroke();
    for(let s=0;s<6;s++){g.strokeStyle='#1a0808';g.lineWidth=1;g.beginPath();g.moveTo(bx-2,hy-5+s*8);g.lineTo(bx+2,hy-5+s*8);g.stroke();}
    g.fillStyle='#050202';g.beginPath();g.arc(bx+bs+i*3,hy+44,3,0,Math.PI*2);g.fill();
  }
  eyes(g,0,hy,false,'#111');
  g.strokeStyle='#1a1a1a';g.lineWidth=1.5;g.strokeRect(-11,hy-6,9,8);g.strokeRect(2,hy-6,9,8);
  g.beginPath();g.moveTo(-2,hy-2);g.lineTo(2,hy-2);g.stroke();g.beginPath();g.moveTo(-11,hy-2);g.lineTo(-14,hy-1);g.stroke();g.beginPath();g.moveTo(11,hy-2);g.lineTo(14,hy-1);g.stroke();
  g.fillStyle='#c0503a';g.beginPath();g.ellipse(0,hy+10,3.5,3*mouth,0,0,Math.PI*2);g.fill();
  g.fillStyle='white';g.beginPath();g.ellipse(0,hy+9,2,1.5*mouth,0,0,Math.PI);g.fill();
  g.strokeStyle='#111';g.lineWidth=4;g.beginPath();g.arc(0,hy,20,Math.PI*1.1,Math.PI*1.9);g.stroke();
  g.fillStyle='#1a1a1a';g.fillRect(-22,hy+4,9,12);g.fillRect(13,hy+4,9,12);g.fillStyle='#7c5cfc';g.fillRect(-21,hy+6,7,8);g.fillRect(14,hy+6,7,8);
  const sr=10+3*Math.sin(T*0.09);
  g.strokeStyle=`rgba(160,130,255,${0.45+0.3*Math.sin(T*0.09)})`;g.lineWidth=1.5;
  g.beginPath();g.arc(26,hy+5,sr,Math.PI*0.2,Math.PI*1.8,false);g.stroke();
  g.beginPath();g.arc(26,hy+5,sr+6,Math.PI*0.25,Math.PI*1.75,false);g.stroke();
  ['♪','♫'].forEach((n,i)=>{const a2=T*0.04+i*3.2;g.fillStyle=`rgba(160,130,255,${0.55+0.3*Math.sin(T*0.05+i)})`;g.font='11px serif';g.textAlign='left';g.fillText(n,20*Math.cos(a2),hy-12+7*Math.sin(a2));});
  g.restore();
}

const FNS={chris:drawChris,rio:drawRio,sofia:drawSofia,manasseh:drawManasseh};
let hits=[];

function loop(){
  T++;stepAgents();cx.clearRect(0,0,W,H);bg();hits=[];
  Object.keys(agents).sort((a,b)=>agents[a].y-agents[b].y).forEach(id=>{
    const a=agents[id];FNS[id](cx,a.x,a.y,T,a.sx);
    hits.push({id,x:a.x-36,y:a.y-78,w:72,h:168});
  });
  requestAnimationFrame(loop);
}
loop();

CV.addEventListener('click',e=>{
  const r=CV.getBoundingClientRect(),sc=W/r.width,mx=(e.clientX-r.left)*sc,my=(e.clientY-r.top)*sc;
  const h=hits.find(a=>mx>=a.x&&mx<=a.x+a.w&&my>=a.y&&my<=a.y+a.h);if(h)open_(h.id);
});
CV.addEventListener('mousemove',e=>{
  const r=CV.getBoundingClientRect(),sc=W/r.width,mx=(e.clientX-r.left)*sc,my=(e.clientY-r.top)*sc;
  CV.style.cursor=hits.find(a=>mx>=a.x&&mx<=a.x+a.w&&my>=a.y&&my<=a.y+a.h)?'pointer':'default';
});

let oAnim=null,curId=null;
function open_(id){
  curId=id;
  document.getElementById('churchWrap').style.display='none';
  document.getElementById('bar').style.display='none';
  const ov=document.getElementById('ov');ov.classList.add('on');
  const nm=document.getElementById('ovName');nm.textContent=DATA[id].reach;nm.style.animation='none';void nm.offsetWidth;nm.style.animation='';
  const oc=document.getElementById('ovCanvas');oc.style.animation='none';void oc.offsetWidth;oc.style.animation='';
  const og=oc.getContext('2d');
  if(oAnim)cancelAnimationFrame(oAnim);
  let lt=0;
  (function animOv(){og.clearRect(0,0,160,190);og.save();og.translate(80,105);og.scale(1.35,1.35);FNS[id](og,0,0,lt+=1,1);og.restore();oAnim=requestAnimationFrame(animOv);})();
  document.getElementById('vbox').style.display='none';
  document.getElementById('preachBtn').style.display='block';
}
function showVerse(){
  const d=DATA[curId];
  document.getElementById('vtext').textContent=d.verse;
  document.getElementById('vref').textContent='— '+d.ref;
  const vb=document.getElementById('vbox');
  vb.style.display='block';vb.style.animation='none';void vb.offsetWidth;vb.style.animation='fadeUp 0.5s ease both';
  document.getElementById('preachBtn').style.display='none';
}
function close_(){
  if(oAnim){cancelAnimationFrame(oAnim);oAnim=null;}
  document.getElementById('ov').classList.remove('on');
  document.getElementById('churchWrap').style.display='block';
  document.getElementById('bar').style.display='flex';
}
</script>
